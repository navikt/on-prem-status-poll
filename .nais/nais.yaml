apiVersion: nais.io/v1
kind: Naisjob
metadata:
  name: onpremstatuspoll
  namespace: navdig
  labels:
    team: navdig
spec:
  image: {{ image }}
  schedule: "*/3 * * * *"
  timeZone: "Europe/Oslo"
  activeDeadlineSeconds: 120
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  concurrencyPolicy: Forbid
  restartPolicy: Never
  env:
    - name: statusholder_url
      value: http://statusholder
    - name: portalserver_path
      value: https://status-api.nav.no/rest
    - name: PORTAL_TARGET
      value: api://prod-gcp.navdig.portalserver/.default

  azure:
    application:
      enabled: true

  accessPolicy:
    outbound:
      rules:
        - application: portalserver
          namespace: navdig
          cluster: prod-gcp
  webproxy: true
