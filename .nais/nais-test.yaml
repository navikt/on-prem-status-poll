apiVersion: nais.io/v1
kind: Naisjob
metadata:
  name: onpremstatuspoll
  namespace: navdig
  labels:
    team: navdig
spec:
  image: {{ image }}
#  schedule: "*/1 * * * *"
  activeDeadlineSeconds: 120
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  restartPolicy: Never
  env:
    - name: statusholder_url
      value: https://statusholder.dev-fss-pub.nais.io
    - name: portalserver_path
      value: https://status-api.intern.dev.nav.no/rest
    - name: PORTAL_TARGET
      value: api://dev-gcp.navdig.portalserver/.default

  azure:
    application:
      tenant: nav.no
      enabled: true

  accessPolicy:
    outbound:
      rules:
        - application: portalserver
          namespace: navdig
          cluster: dev-gcp
        - application: statusholder
          namespace: navdig
          cluster: dev-fss
  webproxy: true
